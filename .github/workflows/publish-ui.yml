name: Publish UI Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@vareotech'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Set dynamic version for main branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version 0.0.0-snapshot-${GITHUB_SHA::7} --no-git-tag-version

      - name: Publish to GitHub Packages
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          REGISTRY="https://npm.pkg.github.com"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry "${REGISTRY}" >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists in GitHub Packages; skipping publish."
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            npm publish --registry "${REGISTRY}" --tag latest
          else
            npm publish --registry "${REGISTRY}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@vareotech'

      - name: Publish to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          REGISTRY="https://registry.npmjs.org"

          npm config set @vareotech:registry "${REGISTRY}"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry "${REGISTRY}" >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists in npm; skipping publish."
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            npm publish --registry "${REGISTRY}" --access public --tag latest
          else
            npm publish --registry "${REGISTRY}" --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
